<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 초인종 (학생용)</title>
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
    h1 { color: #2c3e50; margin-bottom: 30px; font-size: 2.2em; text-align: center; line-height: 1.4; }
    
    .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
    
    .teacher-btn { 
      display: flex; flex-direction: column; justify-content: center; align-items: center; 
      height: 120px; background-color: #ffffff; border: 2px solid #3498db; border-radius: 15px; 
      padding: 10px; font-size: 1.4em; font-weight: bold; color: #3498db; cursor: pointer; 
      transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; 
    }
    .teacher-btn:active { transform: scale(0.95); background-color: #e8f4f8; }
    .teacher-btn.absent { background-color: #e0e0e0; border-color: #9e9e9e; color: #757575; cursor: not-allowed; }
    .absent-text { font-size: 0.6em; font-weight: normal; margin-top: 5px; }

    /* 알림창 및 타이머 스타일 추가 */
    #notification { 
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80%; max-width: 400px; padding: 30px; text-align: center;
      background-color: #2ecc71; color: white; border-radius: 20px; 
      font-size: 1.3em; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000;
    }
    #timerDisplay { 
      display: block; font-size: 3em; font-weight: 800; margin: 15px 0; 
      color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); 
    }
    .close-btn { 
      margin-top: 15px; background: rgba(255,255,255,0.3); border: none; 
      color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; 
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

  <h1 id="roomTitle">🔔 교무실 초인종</h1>
  <div class="grid-container" id="buttonGrid"></div>
  
  <!-- 알림창 구조 -->
  <div id="notification">
    <div id="notiContent"></div>
    <div id="timerDisplay"></div>
    <div id="notiFooter" style="font-size: 0.7em; opacity: 0.9;"></div>
  </div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const room = urlParams.get('room') || '교무실';
  document.getElementById('roomTitle').innerText = `🔔 ${room} 초인종\n(30초 대기 후 응답 없으면 노크)`;

  const firebaseConfig = {
    apiKey: "AIzaSyD4olsHTZr_aMfm6364iIO0ZTN69oFeHl4",
    authDomain: "jinhaesinhangteacher-sroom.firebaseapp.com",
    databaseURL: "https://jinhaesinhangteacher-sroom-default-rtdb.firebaseio.com",
    projectId: "jinhaesinhangteacher-sroom",
    storageBucket: "jinhaesinhangteacher-sroom.firebasestorage.app",
    messagingSenderId: "1095151708102",
    appId: "1:1095151708102:web:dac5b7dfc543e9ca75f4c7"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  const GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbw5bKLty2D9KtTs7w8PT3PdTHutdHgwUtruaIzUFfoE74KgAeuMYJi96fBQgrOqlYHB/exec';

  const grid = document.getElementById('buttonGrid');
  const noti = document.getElementById('notification');
  const notiContent = document.getElementById('notiContent');
  const timerDisplay = document.getElementById('timerDisplay');
  const notiFooter = document.getElementById('notiFooter');

  async function loadTeachers() {
    try {
      grid.innerHTML = '<p>명단을 불러오는 중...</p>';
      const response = await fetch(`${GAS_BASE_URL}?room=${encodeURIComponent(room)}`);
      const teachers = await response.json();
      renderButtons(teachers);
    } catch (e) { 
      grid.innerHTML = '<p>데이터 로드 실패</p>';
    }
  }

  function renderButtons(teachers) {
    grid.innerHTML = "";
    teachers.forEach(t => {
      const btn = document.createElement('button');
      const isAbsent = t.status === 'absent';
      btn.className = `teacher-btn ${isAbsent ? 'absent' : ''}`;

      if (!isAbsent) {
        btn.innerHTML = t.name;
        btn.onclick = () => callTeacher(t.name);
      } else {
        btn.innerHTML = `${t.name}<br><span class="absent-text">(부재중)</span>`;
      }
      grid.appendChild(btn);
    });
  }

  let countdownInterval;

  function callTeacher(name) {
    clearInterval(countdownInterval);

    // 알림창 초기화 및 표시
    noti.style.display = 'block';
    noti.style.backgroundColor = '#2ecc71';
    notiContent.innerText = `${name} 선생님을 호출했습니다.`;
    notiFooter.innerText = "잠시만 서서 기다려 주세요!";
    
    let timeLeft = 30;
    timerDisplay.innerText = `${timeLeft}초`;

    countdownInterval = setInterval(() => {
      timeLeft -= 1;
      timerDisplay.innerText = `${timeLeft}초`;

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        noti.style.backgroundColor = '#e67e22'; // 주황색 전환
        notiContent.innerHTML = "응답이 없으신가요?<br>🚪 노크를 하고 들어가세요!";
        timerDisplay.innerText = "DONE";
        notiFooter.innerHTML = `<button class="close-btn" onclick="document.getElementById('notification').style.display='none'">닫기</button>`;
      }
    }, 1000);

    // Firebase 데이터 전송
    database.ref(`doorbell/${room}/lastCall`).set({
      name: name,
      timestamp: Date.now()
    });
  }

  database.ref(`doorbell/${room}/syncTrigger`).on('value', () => {
    loadTeachers();
  });
  
  loadTeachers();
</script>
</body>
</html>
