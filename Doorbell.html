<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 초인종 (학생용)</title>
  <style>
    /* [스타일] 학교 분위기에 맞게 자유롭게 수정하세요 */
    body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
    h1 { color: #2c3e50; margin-bottom: 30px; font-size: 2.5em; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; width: 100%; max-width: 800px; }
    .teacher-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 120px; background-color: #ffffff; border: 2px solid #3498db; border-radius: 15px; padding: 10px; font-size: 1.5em; font-weight: bold; color: #3498db; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
    .teacher-btn:active { transform: scale(0.95); background-color: #e8f4f8; }
    .teacher-btn.absent { background-color: #e0e0e0; border-color: #9e9e9e; color: #757575; cursor: not-allowed; }
    .absent-text { font-size: 0.6em; font-weight: normal; margin-top: 5px; }
    #notification { display: none; margin-top: 30px; padding: 15px 30px; background-color: #2ecc71; color: white; border-radius: 10px; font-size: 1.2em; font-weight: bold; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

  <h1 id="roomTitle">🔔 교무실 초인종</h1>
  <div class="grid-container" id="buttonGrid"></div>
  <div id="notification"></div>

<script>
  /** [중요] 1. URL 파라미터 설정 (예: ?room=교무실) **/
  const urlParams = new URLSearchParams(window.location.search);
  const room = urlParams.get('room') || '교무실';
  document.getElementById('roomTitle').innerText = `🔔 ${room} 초인종(30초 대기 후 응답 없으면 노크)`;

  /** [중요] 2. Firebase 설정 (본인의 Firebase 프로젝트 정보를 입력하세요) **/
  const firebaseConfig = {
    apiKey: "AIzaSyD4olsHTZr_aMfm6364iIO0ZTN69oFeHl4",
    authDomain: "jinhaesinhangteacher-sroom.firebaseapp.com",
    databaseURL: "https://jinhaesinhangteacher-sroom-default-rtdb.firebaseio.com",
    projectId: "jinhaesinhangteacher-sroom",
    storageBucket: "jinhaesinhangteacher-sroom.firebasestorage.app",
    messagingSenderId: "1095151708102",
    appId: "1:1095151708102:web:dac5b7dfc543e9ca75f4c7"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  /** [중요] 3. 구글 앱스 스크립트(GAS) 웹앱 URL **/
  const GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbw5bKLty2D9KtTs7w8PT3PdTHutdHgwUtruaIzUFfoE74KgAeuMYJi96fBQgrOqlYHB/exec';

  const grid = document.getElementById('buttonGrid');
  const noti = document.getElementById('notification');

  // 명단 로드
  async function loadTeachers() {
    try {
      grid.innerHTML = '<p>불러오는 중...</p>';
      const response = await fetch(`${GAS_BASE_URL}?room=${encodeURIComponent(room)}`);
      const teachers = await response.json();
      renderButtons(teachers);
    } catch (e) { 
      grid.innerHTML = '<p>데이터 로드 실패</p>';}
  }

function renderButtons(teachers) {
    grid.innerHTML = "";
    teachers.forEach(t => {
      const btn = document.createElement('button');
      btn.className = `teacher-btn ${t.status === 'absent' ? 'absent' : ''}`;

      if (t.status === 'present') {
        btn.innerHTML = t.name;
        btn.onclick = () => callTeacher(t.name);
      } else {
        btn.innerHTML = `${t.name}<br><span class="absent-text">(부재중)</span>`;
      }
      grid.appendChild(btn);
    });
  }

let countdownInterval; // 타이머 변수

  function callTeacher(name) {
    // 기존에 돌아가던 타이머가 있다면 초기화
    clearInterval(countdownInterval);

    noti.style.display = 'block';
    noti.style.backgroundColor = '#2ecc71'; // 호출 성공 시 초록색
    
    let timeLeft = 30; // 20초 설정
    
    // 알림창 내용 구성
    noti.innerHTML = `
      <div>${name} 선생님을 호출했습니다.</div>
      <div id="timerDisplay">${timeLeft}초</div>
      <div style="font-size: 0.8em; font-weight: normal; margin-top: 5px;">잠시만 기다려 주세요!</div>
    `;

    // 1초마다 실행되는 타이머
    countdownInterval = setInterval(() => {
      timeLeft -= 1;
      const timerDisplay = document.getElementById('timerDisplay');
      
      if (timerDisplay) {
        timerDisplay.innerText = `${timeLeft}초`;
      }

      // 0초가 되었을 때
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        noti.style.backgroundColor = '#e67e22'; // 대기 종료 시 주황색으로 변경
        noti.innerHTML = `
          <div>응답이 없으신가요?</div>
          <div style="font-size: 1.2em; margin: 10px 0;">🚪 노크를 하고 들어가세요!</div>
          <button onclick="this.parentElement.style.display='none'" style="background:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;">닫기</button>
        `;
      }
    }, 1000);

    // Firebase 실시간 호출 데이터 쓰기
    database.ref(`doorbell/${room}/lastCall`).set({
      name: name,
      timestamp: Date.now()
    });
  }

  // 상태 변경 동기화 리스너
  database.ref(`doorbell/${room}/syncTrigger`).on('value', () => {
    loadTeachers();
  });
  
  loadTeachers();
</script>
</body>
</html>
