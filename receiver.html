<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진해신항중 교무실 현황판</title>
  <style>
    /* 배경 및 기본 폰트 설정 */
    body { background-color: #2c3e50 !important; color: white !important; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
    h1 { margin-bottom: 20px; }
    
    /* 현황판 컨테이너 */
    .status-board { width: 100%; max-width: 500px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .teacher-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .teacher-row:last-child { border-bottom: none; }
    
    /* 버튼 스타일 */
    .toggle-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; min-width: 70px; }
    .btn-present { background-color: #2ecc71; color: white; }
    .btn-absent { background-color: #e74c3c; color: white; }
    .unlock-btn { padding: 12px 20px; background: #f39c12; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    
    /* 모달 알림창 */
    #callModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 9999; }
    .modal-content { background: white; color: #2c3e50; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<h1 id="roomTitle">💻 로딩 중...</h1>
<button class="unlock-btn" id="audioBtn" onclick="unlockAudio(this)">🔊 알람 수신 활성화 (클릭 필수)</button>
<div class="status-board" id="teacherList">선생님 목록을 가져오고 있습니다...</div>

<div id="callModal">
  <div class="modal-content">
    <h2 id="callerName" style="color: #e74c3c; font-size: 2.5em; margin-top: 0;"></h2>
    <p style="font-size: 1.5em; margin-bottom: 30px;">선생님! 학생이 찾습니다.</p>
    <button onclick="closePopup()" style="padding: 15px 40px; font-size: 1.2em; cursor: pointer; background: #34495e; color: white; border: none; border-radius: 10px;">확인 완료</button>
  </div>
</div>
  
<div id="loadingToast" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 15px 25px; border-radius: 30px; z-index: 10001; font-weight: bold;">
  처리 중입니다...
</div>
  
<script>
  /** 1. 기본 설정 및 파라미터 처리 **/
  const urlParams = new URLSearchParams(window.location.search);
  const room = urlParams.get('room') || '교무실';
  const myName = urlParams.get('name'); 

  if (myName) {
    document.getElementById('roomTitle').innerText = `진해신항중 ${room} 현황판 (${myName} 선생님)`;
  } else {
    document.getElementById('roomTitle').innerText = `진해신항중 ${room} 현황판`;
  }
  
  const firebaseConfig = { 
    apiKey: "AIzaSyD4olsHTZr_aMfm6364iIO0ZTN69oFeHl4",
    authDomain: "jinhaesinhangteacher-sroom.firebaseapp.com",
    databaseURL: "https://jinhaesinhangteacher-sroom-default-rtdb.firebaseio.com",
    projectId: "jinhaesinhangteacher-sroom",
    storageBucket: "jinhaesinhangteacher-sroom.firebasestorage.app",
    messagingSenderId: "1095151708102",
    appId: "1:1095151708102:web:dac5b7dfc543e9ca75f4c7"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbw5bKLty2D9KtTs7w8PT3PdTHutdHgwUtruaIzUFfoE74KgAeuMYJi96fBQgrOqlYHB/exec';

  let isAudioUnlocked = false;
  let isFirstLoad = true; // 최초 로드 시 과거 알림 무시용

  /** 2. 핵심 함수: 음성 및 권한 활성화 **/
  function unlockAudio(btn) {
    const emptyUtterance = new SpeechSynthesisUtterance("");
    window.speechSynthesis.speak(emptyUtterance);
    isAudioUnlocked = true;
    btn.innerText = "✅ 알람 수신 활성화됨";
    btn.style.backgroundColor = "#2ecc71";
  }

  /** 3. 데이터 로드 및 업데이트 로직 **/
  async function loadTeachers() {
    try {
      const response = await fetch(`${GAS_BASE_URL}?room=${encodeURIComponent(room)}`);
      const teachers = await response.json();
      const listDiv = document.getElementById('teacherList');
      listDiv.innerHTML = "";
      
      teachers.forEach(t => {
        const row = document.createElement('div');
        row.className = 'teacher-row';
        row.innerHTML = `<span>${t.name}</span>
          <button class="toggle-btn ${t.status === 'present' ? 'btn-present' : 'btn-absent'}"
            onclick="updateStatus('${t.name}', '${t.status}')">${t.status === 'present' ? '재실' : '부재중'}</button>`;
        listDiv.appendChild(row);
      });
    } catch (e) { console.error("데이터 로드 에러:", e); }
  }

  function updateStatus(name, currentStatus) {
  const newStatus = currentStatus === 'present' ? '부재중' : '재실';
  const toast = document.getElementById('loadingToast');
  
  // 1. 메시지 표시 (현재 어떤 상태로 바꾸는지 보여줌)
  toast.innerText = `${newStatus} 처리 중입니다...`;
  toast.style.display = 'block';

  const url = `${GAS_BASE_URL}?action=update&room=${encodeURIComponent(room)}&name=${encodeURIComponent(name)}&status=${encodeURIComponent(newStatus)}`;
  
  fetch(url)
    .then(() => {
      database.ref(`doorbell/${room}/syncTrigger`).set(Date.now());
      loadTeachers(); // 목록 새로고침
    })
    .catch(err => {
      console.error("업데이트 실패:", err);
      alert("처리에 실패했습니다. 다시 시도해 주세요.");
    })
    .finally(() => {
      // 2. 처리가 끝나면(성공하든 실패하든) 1초 후에 메시지 숨기기
      setTimeout(() => {
        toast.style.display = 'none';
      }, 1000); 
    });
}

  /** 4. 실시간 리스너 (알림 및 동기화) **/
  database.ref(`doorbell/${room}/lastCall`).on('value', (snapshot) => {
    // 페이지 처음 열었을 때 뜨는 이전 데이터 무시
    if (isFirstLoad) {
      isFirstLoad = false;
      return;
    }

    const data = snapshot.val();
    if (data && data.name) {
      // 필터링: 전체모드(!myName)이거나, 내 이름과 호출된 이름이 같을 때
      const isTarget = !myName || myName.trim() === data.name.trim();

      if (isTarget) {
        document.getElementById('callerName').innerText = `🚨 ${data.name} 선생님`;
        document.getElementById('callModal').style.display = 'flex';
        
        if (isAudioUnlocked) {
          const msg = new SpeechSynthesisUtterance(`${data.name} 선생님, 학생이 찾아 왔습니다.`);
          msg.lang = 'ko-KR';
          window.speechSynthesis.speak(msg);
        }
      }
    }
  });

  // 다른 기기에서 상태 변경 시 자동 갱신
  database.ref(`doorbell/${room}/syncTrigger`).on('value', (snapshot) => {
    if (!isFirstLoad) loadTeachers();
  });

  function closePopup() {
    document.getElementById('callModal').style.display = 'none';
    window.speechSynthesis.cancel(); 
  }
  
  // 실행 시작
  loadTeachers();
</script>
</body>
</html>
