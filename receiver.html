<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진해신항중 교무실 현황판</title>
  <style>
    /* 폰트 로드 (Pretendard가 없을 경우를 대비해 기본 샌즈세리프 추가) */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body { 
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
        background-color: #2c3e50 !important; /* 배경색 강제 적용 */
        color: white; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 20px; 
        margin: 0;
        min-height: 100vh;
    }

    .status-board { 
        width: 100%; 
        max-width: 500px; /* 너무 넓지 않게 조정 */
        background: rgba(255, 255, 255, 0.1); 
        border-radius: 15px; 
        padding: 10px; 
        margin-top: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .teacher-row { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 12px 20px; 
        border-bottom: 1px solid rgba(255,255,255,0.1); 
    }

    .teacher-row:last-child { border-bottom: none; }

    .teacher-row span {
        font-size: 1.1em;
        font-weight: 500;
    }

    .toggle-btn { 
        padding: 8px 16px; 
        border-radius: 6px; 
        border: none; 
        font-weight: bold; 
        cursor: pointer; 
        transition: 0.2s;
        min-width: 80px;
    }

    .btn-present { background-color: #2ecc71; color: white; }
    .btn-absent { background-color: #e74c3c; color: white; }
    
    .unlock-btn { 
        margin-top: 10px;
        padding: 12px 24px; 
        background: #f39c12; 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        font-size: 1em;
        font-weight: bold;
    }

    /* 팝업 모달 */
    .modal { 
        display: none; 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background: rgba(0,0,0,0.85); 
        justify-content: center; 
        align-items: center; 
        z-index: 1000;
    }
    .modal-content { 
        background: white; 
        color: #2c3e50; 
        padding: 40px; 
        border-radius: 20px; 
        text-align: center; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
</style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<h1 id="roomTitle">💻 교무실 수신 현황판</h1>
<button class="unlock-btn" onclick="unlockAudio(this)">🔊 알람 수신 활성화 (클릭 필수)</button>
<div class="status-board" id="teacherList">로딩 중...</div>

<div class="modal" id="callModal">
  <div class="modal-content">
    <h2 id="callerName" style="color: #e74c3c; font-size: 2.5em;"></h2>
    <p style="font-size: 1.5em;">선생님! 학생이 찾습니다.</p>
    <button onclick="closePopup()" style="padding: 15px 30px; font-size: 1.2em;">확인</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const room = urlParams.get('room') || '교무실';
  const myName = urlParams.get('name'); // 내 이름 파라미터 추가
  // 제목에 내 이름 표시 (선택 사항)
  document.getElementById('roomTitle').innerText = `💻 ${room} 현황판 ${myName ? `(${myName}님)` : ''}`;

  /** [중요] Firebase 및 GAS 설정 (doorbell.html과 동일하게 설정하세요) **/
  const firebaseConfig = { apiKey: "AIzaSyD4olsHTZr_aMfm6364iIO0ZTN69oFeHl4",
    authDomain: "jinhaesinhangteacher-sroom.firebaseapp.com",
    databaseURL: "https://jinhaesinhangteacher-sroom-default-rtdb.firebaseio.com",
    projectId: "jinhaesinhangteacher-sroom",
    storageBucket: "jinhaesinhangteacher-sroom.firebasestorage.app",
    messagingSenderId: "1095151708102",
    appId: "1:1095151708102:web:dac5b7dfc543e9ca75f4c7"
 };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbw5bKLty2D9KtTs7w8PT3PdTHutdHgwUtruaIzUFfoE74KgAeuMYJi96fBQgrOqlYHB/exec';

  let isAudioUnlocked = false;
  const pageLoadTime = Date.now();

  function unlockAudio(btn) {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
    isAudioUnlocked = true;
    btn.innerText = "✅ 수신 활성화됨";
    btn.style.backgroundColor = "#2ecc71";
  }

async function loadTeachers() {
  const listDiv = document.getElementById('teacherList');
  const response = await fetch(`${GAS_BASE_URL}?room=${encodeURIComponent(room)}`);
  const teachers = await response.json();
  listDiv.innerHTML = "";
  teachers.forEach(t => {
    const row = document.createElement('div');
    row.className = 'teacher-row';
    row.innerHTML = `<span>${t.name}</span>
      <button class="toggle-btn ${t.status === 'present' ? 'btn-present' : 'btn-absent'}"
        onclick="updateStatus('${t.name}', '${t.status}')">${t.status === 'present' ? '재실' : '부재중'}</button>`;
    listDiv.appendChild(row);
  });
}

function updateStatus(name, currentStatus) {
  const newStatus = currentStatus === 'present' ? '부재중' : '재실';
  const url = `${GAS_BASE_URL}?action=update&room=${encodeURIComponent(room)}&name=${encodeURIComponent(name)}&status=${encodeURIComponent(newStatus)}`;
  fetch(url).then(() => {
    database.ref(`doorbell/${room}/syncTrigger`).set(Date.now());
    loadTeachers();
  });
}

// Firebase 실시간 리스너
database.ref(`doorbell/${room}/lastCall`).on('value', (snapshot) => {
  const data = snapshot.val();
  if (data && data.timestamp > pageLoadTime) {
    document.getElementById('callerName').innerText = `🚨 ${data.name}`;
    document.getElementById('callModal').style.display = 'flex';
    if (isAudioUnlocked) {
      const msg = new SpeechSynthesisUtterance(`${data.name} 선생님, 학생이 호출했습니다.`);
      msg.lang = 'ko-KR';
      window.speechSynthesis.speak(msg);
    }
  }
});

database.ref(`doorbell/${room}/syncTrigger`).on('value', (snapshot) => {
  if (snapshot.exists()) {
    loadTeachers(); // 누군가 상태를 바꾸면 내 화면도 자동 갱신
  }
});
  
function closePopup() {
    document.getElementById('callModal').style.display = 'none';
    window.speechSynthesis.cancel(); 
  }
  
  loadTeachers();
</script>
</body>
</html>
